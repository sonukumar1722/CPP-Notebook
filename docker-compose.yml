version: "3.9"

services:
  api:
    build:
      context: ./backend
    environment:
      CPPNOTE_JWT_SECRET: change-me
      CPPNOTE_KERNEL_NAME: xcpp17
      CPPNOTE_WORKSPACE_ROOT: /app/workspaces
      CPPNOTE_UPLOAD_ROOT: /app/uploads
      CPPNOTE_FRONTEND_ORIGIN: http://localhost:5173
      CPPNOTE_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/cppnote
      CPPNOTE_USER_EMAIL: admin@cppnote.local
      CPPNOTE_USER_PASSWORD: "cppnote123"
      CPPNOTE_DISPLAY_NAME: Developer
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  web:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    depends_on:
      - api

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cppnote
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  pgdata:
